<!-- templates/sms/payment_result.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Payment Result - Lunserk ERP</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .result-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideUp 0.5s ease-out;
        }
        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        .success-icon {
            font-size: 80px;
            color: #10b981;
            margin-bottom: 20px;
        }
        .error-icon {
            font-size: 80px;
            color: #ef4444;
            margin-bottom: 20px;
        }
        h2 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        .message {
            color: #6b7280;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        .credits {
            font-size: 36px;
            font-weight: bold;
            color: #8b5cf6;
            margin: 20px 0;
        }
        button {
            background: linear-gradient(135deg, #ffa500 0%, #ff8c00 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        .close-window {
            background: #6b7280;
            margin-left: 10px;
        }
        .buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="result-card">
        {% if success %}
            <div class="success-icon">✓</div>
            <h2 style="color: #10b981;">Payment Successful!</h2>
            <div class="message">{{ message }}</div>
            {% if credits_added > 0 %}
                <div class="credits">{{ credits_added }} SMS Credits Added</div>
            {% endif %}
        {% else %}
            <div class="error-icon">✗</div>
            <h2 style="color: #ef4444;">Payment Failed</h2>
            <div class="message">{{ message }}</div>
        {% endif %}
        
        <div class="buttons">
            <button onclick="window.close()">Close Window</button>
            <button onclick="sendResultToParent()" class="close-window">Continue</button>
        </div>
    </div>
    
    <script>
        function sendResultToParent() {
            // Send result to parent window
            if (window.opener) {
                window.opener.postMessage({
                    type: 'payment_complete',
                    success: {{ success|lower }},
                    credits: {{ credits_added }}
                }, '*');
                window.close();
            } else {
                // If no opener, redirect to settings page
                window.location.href = '/sms-settings?payment_result={% if success %}success{% else %}failed{% endif %}&credits={{ credits_added }}';
            }
        }
        
        // Auto close after 5 seconds on success
        {% if success %}
        setTimeout(() => {
            sendResultToParent();
        }, 5000);
        {% endif %}
    </script>
</body>
</html>
