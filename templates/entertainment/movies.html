{% extends "base.html" %}

{% block title %}Movies - Entertainment{% endblock %}

{% block content %}
<div class="w-full">
    <!-- Header Section -->
    <div class="mb-6">
        <h1 class="text-2xl md:text-3xl font-bold text-gray-800">Movie Library</h1>
        <p class="text-sm md:text-base text-gray-600 mt-1">Discover the most popular Luganda translated movies</p>
    </div>

    <!-- Search Section -->
    <div class="mb-6">
        <div class="max-w-2xl">
            <div class="relative">
                <input type="text" 
                       id="searchInput" 
                       placeholder="Search movies by title, VJ, or genre..." 
                       class="w-full px-4 py-2.5 pl-10 pr-10 text-gray-700 border border-gray-300 rounded-lg focus:outline-none focus:border-orange-500 focus:ring-2 focus:ring-orange-200 transition text-sm">
                <!-- Search Icon -->
                <svg class="absolute left-3 top-3 h-4 w-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
                <button id="clearSearch" class="absolute right-3 top-3 text-gray-400 hover:text-gray-600 hidden">
                    <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            <div id="searchResults" class="mt-4 hidden"></div>
        </div>
    </div>

    <!-- Filters Row -->
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
        <div class="flex flex-wrap gap-2">
            <button data-filter="all" class="filter-btn active px-4 py-2 bg-orange-500 text-white rounded-lg hover:bg-orange-600 transition text-sm font-medium">
                All Movies
            </button>
            <button data-filter="popular" class="filter-btn px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition text-sm font-medium">
                Most Popular
            </button>
            <button data-filter="trending" class="filter-btn px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition text-sm font-medium">
                Trending
            </button>
        </div>
        <div class="flex items-center gap-2 w-full sm:w-auto">
            <label class="text-sm text-gray-600 whitespace-nowrap">Sort by:</label>
            <select id="sortBy" class="flex-1 sm:flex-initial px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-orange-500 text-sm">
                <option value="likes">Most Liked</option>
                <option value="views">Most Viewed</option>
                <option value="recent">Most Recent</option>
            </select>
        </div>
    </div>

    <!-- Movies Grid -->
    <div id="moviesGrid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 md:gap-5">
        <!-- Loading Spinner -->
        <div class="col-span-full flex justify-center items-center py-12">
            <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-orange-500"></div>
        </div>
    </div>

    <!-- Load More Button -->
    <div id="loadMoreContainer" class="text-center mt-8 hidden">
        <button id="loadMoreBtn" class="px-6 py-2.5 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition text-sm font-medium">
            Load More Movies
        </button>
    </div>

    <!-- No Results Message -->
    <div id="noResults" class="text-center py-12 hidden">
        <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
        <h3 class="mt-4 text-lg font-medium text-gray-900">No movies found</h3>
        <p class="mt-1 text-gray-500">Try adjusting your search or filter criteria</p>
    </div>
</div>

<script>
// Movie data and pagination state
let currentPage = 1;
let currentFilter = 'all';
let currentSort = 'likes';
let isLoading = false;
let hasMore = true;
let currentMovies = [];
let searchMode = false;

// Fetch movies from API
async function fetchMovies(page = 1, limit = 20) {
    try {
        const response = await fetch(`/entertainment/api/movies/popular?limit=${limit}&page=${page}`);
        const data = await response.json();
        
        if (data.success) {
            return {
                movies: data.movies,
                pagination: data.pagination
            };
        }
        return { movies: [], pagination: null };
    } catch (error) {
        console.error('Error fetching movies:', error);
        return { movies: [], pagination: null };
    }
}

// Search movies
async function searchMovies(query) {
    try {
        const response = await fetch(`/entertainment/api/movies/search?q=${encodeURIComponent(query)}`);
        const data = await response.json();
        
        if (data.success) {
            return data.movies;
        }
        return [];
    } catch (error) {
        console.error('Error searching movies:', error);
        return [];
    }
}

// Render movie cards
function renderMovies(movies) {
    if (!movies || movies.length === 0) {
        document.getElementById('moviesGrid').innerHTML = '';
        document.getElementById('noResults').classList.remove('hidden');
        document.getElementById('loadMoreContainer').classList.add('hidden');
        return;
    }
    
    document.getElementById('noResults').classList.add('hidden');
    
    // Sort movies
    let sortedMovies = [...movies];
    if (currentSort === 'likes') {
        sortedMovies.sort((a, b) => (b.likes || 0) - (a.likes || 0));
    } else if (currentSort === 'views') {
        sortedMovies.sort((a, b) => (b.views || 0) - (a.views || 0));
    } else if (currentSort === 'recent') {
        sortedMovies.sort((a, b) => new Date(b.upload_date) - new Date(a.upload_date));
    }
    
    const grid = document.getElementById('moviesGrid');
    grid.innerHTML = sortedMovies.map(movie => `
        <div class="bg-white rounded-lg shadow-md overflow-hidden hover:shadow-xl transition-shadow duration-300 group">
            <div class="relative pb-[140%] bg-gray-200 overflow-hidden">
                <img src="${movie.artwork_url || 'https://via.placeholder.com/300x420?text=No+Poster'}" 
                     alt="${escapeHtml(movie.title)}"
                     class="absolute inset-0 w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"
                     loading="lazy"
                     onerror="this.src='https://via.placeholder.com/300x420?text=No+Poster'">
                <div class="absolute top-2 right-2 bg-orange-500 text-white px-1.5 py-0.5 rounded-lg text-xs font-semibold flex items-center gap-1">
                    <svg class="h-3 w-3" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                    </svg>
                    <span>${movie.likes || 0}</span>
                </div>
                ${movie.vj_labels && movie.vj_labels.length ? `
                <div class="absolute bottom-2 left-2 bg-black bg-opacity-75 text-white px-1.5 py-0.5 rounded text-xs">
                    ${escapeHtml(movie.vj_labels[0])}
                </div>
                ` : ''}
            </div>
            <div class="p-3">
                <h3 class="font-semibold text-gray-800 mb-1 line-clamp-2 text-sm min-h-[2.5rem]">
                    ${escapeHtml(movie.title)}
                </h3>
                <div class="flex justify-between items-center text-xs text-gray-600 mt-2">
                    <div class="flex items-center gap-1">
                        <svg class="h-3 w-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                        </svg>
                        <span>${formatNumber(movie.views || 0)}</span>
                    </div>
                    <div class="flex items-center gap-1">
                        <svg class="h-3 w-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                        </svg>
                        <span>${formatNumber(movie.downloads || 0)}</span>
                    </div>
                    <div class="flex items-center gap-1">
                        <svg class="h-3 w-3 text-orange-500" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                        </svg>
                        <span>${formatNumber(movie.likes || 0)}</span>
                    </div>
                </div>
                <button onclick="watchMovie('${movie.id}')" 
                        class="mt-3 w-full bg-orange-500 text-white py-1.5 rounded-lg hover:bg-orange-600 transition font-medium text-sm">
                    Watch Now
                </button>
            </div>
        </div>
    `).join('');
}

// Watch movie function
function watchMovie(movieId) {
    const movie = currentMovies.find(m => m.id === movieId);
    if (movie && movie.video_url) {
        openVideoModal(movie);
    } else {
        alert('Video URL not available');
    }
}

// Video modal
function openVideoModal(movie) {
    const modalHtml = `
        <div id="videoModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-90 p-4">
            <div class="relative w-full max-w-4xl bg-black rounded-lg overflow-hidden">
                <button onclick="closeVideoModal()" class="absolute top-2 right-2 text-white hover:text-gray-300 z-10 p-1">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
                <div class="relative" style="padding-bottom: 56.25%;">
                    <video controls autoplay class="absolute inset-0 w-full h-full">
                        <source src="${movie.video_url}" type="video/mp4">
                        Your browser does not support the video tag.
                    </video>
                </div>
                <div class="p-4 bg-gray-900 text-white">
                    <h3 class="text-lg md:text-xl font-bold">${escapeHtml(movie.title)}</h3>
                    <p class="text-sm text-gray-300 mt-1">${movie.vj_labels ? escapeHtml(movie.vj_labels.join(', ')) : 'VJ Movie'}</p>
                </div>
            </div>
        </div>
    `;
    
    document.body.insertAdjacentHTML('beforeend', modalHtml);
    document.body.style.overflow = 'hidden';
}

function closeVideoModal() {
    const modal = document.getElementById('videoModal');
    if (modal) {
        modal.remove();
        document.body.style.overflow = '';
    }
}

// Load initial movies
async function loadInitialMovies() {
    isLoading = true;
    const result = await fetchMovies(1, 50);
    
    if (result.movies) {
        currentMovies = result.movies;
        renderMovies(currentMovies);
        hasMore = result.pagination?.hasMore || false;
        
        if (hasMore) {
            document.getElementById('loadMoreContainer').classList.remove('hidden');
        }
    }
    
    isLoading = false;
}

// Load more movies
async function loadMoreMovies() {
    if (isLoading || !hasMore || searchMode) return;
    
    isLoading = true;
    currentPage++;
    const result = await fetchMovies(currentPage, 20);
    
    if (result.movies && result.movies.length > 0) {
        currentMovies = [...currentMovies, ...result.movies];
        renderMovies(currentMovies);
        hasMore = result.pagination?.hasMore || false;
        
        if (!hasMore) {
            document.getElementById('loadMoreContainer').classList.add('hidden');
        }
    }
    
    isLoading = false;
}

// Handle search
let searchTimeout;
const searchInput = document.getElementById('searchInput');
const clearSearchBtn = document.getElementById('clearSearch');

if (searchInput) {
    searchInput.addEventListener('input', (e) => {
        clearTimeout(searchTimeout);
        const query = e.target.value.trim();
        
        if (query.length > 0) {
            clearSearchBtn.classList.remove('hidden');
            searchTimeout = setTimeout(async () => {
                searchMode = true;
                document.getElementById('loadMoreContainer').classList.add('hidden');
                isLoading = true;
                
                const results = await searchMovies(query);
                currentMovies = results;
                renderMovies(currentMovies);
                
                isLoading = false;
            }, 500);
        } else {
            clearSearchBtn.classList.add('hidden');
            if (searchMode) {
                searchMode = false;
                currentPage = 1;
                loadInitialMovies();
            }
        }
    });
}

if (clearSearchBtn) {
    clearSearchBtn.addEventListener('click', () => {
        if (searchInput) {
            searchInput.value = '';
            clearSearchBtn.classList.add('hidden');
            if (searchMode) {
                searchMode = false;
                currentPage = 1;
                loadInitialMovies();
            }
        }
    });
}

// Sort and filter handlers
const sortBy = document.getElementById('sortBy');
if (sortBy) {
    sortBy.addEventListener('change', (e) => {
        currentSort = e.target.value;
        renderMovies(currentMovies);
    });
}

document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
        document.querySelectorAll('.filter-btn').forEach(b => {
            b.classList.remove('active', 'bg-orange-500', 'text-white');
            b.classList.add('bg-gray-200', 'text-gray-700');
        });
        btn.classList.add('active', 'bg-orange-500', 'text-white');
        btn.classList.remove('bg-gray-200', 'text-gray-700');
        
        currentFilter = btn.dataset.filter;
    });
});

const loadMoreBtn = document.getElementById('loadMoreBtn');
if (loadMoreBtn) {
    loadMoreBtn.addEventListener('click', loadMoreMovies);
}

// Helper functions
function formatNumber(num) {
    if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
    if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
    return num.toString();
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// Initialize page
loadInitialMovies();

// Close modal on escape key
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
        closeVideoModal();
    }
});
</script>

<style>
.line-clamp-2 {
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

.filter-btn.active {
    background-color: #f59e0b !important;
    color: white !important;
}

.filter-btn.active:hover {
    background-color: #d97706 !important;
}
</style>
{% endblock %}
