<!-- templates/library/search.html -->
{% extends "base.html" %}

{% block title %}Search Books - Digital Library{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto">
    <h1 class="text-3xl font-bold mb-6">Search Results</h1>
    
    <div class="flex flex-col lg:flex-row gap-6">
        <!-- Filters Sidebar -->
        <div class="lg:w-1/4">
            <div class="bg-white rounded-lg shadow p-4 sticky top-4">
                <h3 class="font-semibold text-lg mb-3">Filters</h3>
                
                <div class="mb-4">
                    <label class="block text-sm font-medium mb-2">Subject</label>
                    <select id="subjectFilter" class="w-full px-3 py-2 border rounded-lg">
                        <option value="all">All Subjects</option>
                        <option value="Mathematics">Mathematics</option>
                        <option value="Physics">Physics</option>
                        <option value="Chemistry">Chemistry</option>
                        <option value="Biology">Biology</option>
                        <option value="History">History</option>
                        <option value="Geography">Geography</option>
                        <option value="Business Studies">Business Studies</option>
                        <option value="English">English</option>
                        <option value="Computer Science">Computer Science</option>
                        <option value="General">General</option>
                    </select>
                </div>
                
                <div class="mb-4">
                    <label class="block text-sm font-medium mb-2">Language</label>
                    <select id="languageFilter" class="w-full px-3 py-2 border rounded-lg">
                        <option value="all">All Languages</option>
                        <option value="English">English</option>
                        <option value="Kiswahili">Kiswahili</option>
                    </select>
                </div>
            </div>
        </div>
        
        <!-- Results -->
        <div class="lg:w-3/4">
            <div id="resultsContainer" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="col-span-full text-center py-12">
                    <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
                    <p class="mt-4 text-gray-600">Loading...</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// Same search logic as index page

// Search books function
function searchBooks() {
    if (isLoading) return;
    
    isLoading = true;
    $('#loadMoreContainer').addClass('hidden');
    
    // Show loader in the container
    if (currentPage === 1) {
        $('#booksContainer').html(`
            <div class="col-span-full text-center py-12">
                <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
                <p class="mt-4 text-gray-600">Searching for books...</p>
            </div>
        `);
    } else {
        $('#loadMoreBtn').html('<i class="fas fa-spinner fa-spin mr-2"></i>Loading...');
    }
    
    $.ajax({
        url: '/library/api/books/search',
        method: 'GET',
        data: {
            q: currentQuery,
            page: currentPage,
            subject: currentSubject
        },
        success: function(response) {
            if (response.error) {
                $('#booksContainer').html(`
                    <div class="col-span-full text-center py-12">
                        <p class="text-red-600">${response.error}</p>
                    </div>
                `);
                return;
            }
            
            if (currentPage === 1) {
                $('#booksContainer').empty();
            }
            
            if (response.books && response.books.length > 0) {
                renderBooks(response.books);
                hasMore = response.has_more;
                
                if (hasMore) {
                    $('#loadMoreContainer').removeClass('hidden');
                    $('#loadMoreBtn').html('Load More Books');
                } else {
                    $('#loadMoreContainer').addClass('hidden');
                }
            } else if (currentPage === 1) {
                $('#booksContainer').html(`
                    <div class="col-span-full text-center py-12">
                        <p class="text-gray-600">No books found. Try a different search term.</p>
                    </div>
                `);
                $('#loadMoreContainer').addClass('hidden');
            }
        },
        error: function(xhr) {
            $('#booksContainer').html(`
                <div class="col-span-full text-center py-12">
                    <p class="text-red-600">Error loading books. Please try again.</p>
                </div>
            `);
        },
        complete: function() {
            isLoading = false;
            $('#loadMoreBtn').html('Load More Books');
        }
    });
}

// Render books to grid
function renderBooks(books) {
    books.forEach(book => {
        const bookCard = `
            <div class="bg-white rounded-lg shadow-md overflow-hidden hover:shadow-xl transition duration-300">
                <div class="relative h-48 bg-gray-100">
                    <img src="${book.cover || 'https://via.placeholder.com/200x300?text=No+Cover'}" 
                         alt="${book.title}"
                         class="w-full h-full object-cover"
                         onerror="this.src='https://via.placeholder.com/200x300?text=No+Cover'">
                </div>
                <div class="p-4">
                    <h3 class="font-semibold text-gray-800 mb-1 line-clamp-2">${escapeHtml(book.title)}</h3>
                    <p class="text-sm text-gray-600 mb-1">${escapeHtml(book.author || 'Unknown Author')}</p>
                    <div class="flex justify-between items-center text-xs text-gray-500 mb-3">
                        <span>${book.year || 'N/A'}</span>
                        <span>${book.format}</span>
                        <span>${book.size}</span>
                    </div>
                    <div class="flex gap-2">
                        <a href="/library/book/${book.id}" 
                           class="flex-1 bg-blue-600 text-white text-center px-3 py-2 rounded text-sm hover:bg-blue-700 transition">
                            <i class="fas fa-info-circle mr-1"></i>Details
                        </a>
                        <button onclick="downloadBook('${book.id}', '${escapeHtml(book.title)}')" 
                                class="bg-green-600 text-white px-3 py-2 rounded text-sm hover:bg-green-700 transition">
                            <i class="fas fa-download"></i>
                        </button>
                    </div>
                </div>
            </div>
        `;
        $('#booksContainer').append(bookCard);
    });
}

// Download book function
function downloadBook(bookId, title) {
    if (!confirm(`Download "${title}"?`)) return;
    
    const downloadBtn = event.target.closest('button');
    const originalHtml = downloadBtn.innerHTML;
    downloadBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
    downloadBtn.disabled = true;
    
    $.ajax({
        url: `/library/api/books/${bookId}/download`,
        method: 'POST',
        xhrFields: {
            responseType: 'blob'
        },
        success: function(blob) {
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${title}.pdf`;
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
            a.remove();
            
            // Show success message
            const toast = $(`<div class="fixed bottom-4 right-4 bg-green-600 text-white px-6 py-3 rounded-lg shadow-lg z-50">Download started!</div>`);
            $('body').append(toast);
            setTimeout(() => toast.fadeOut(300, function() { $(this).remove(); }), 3000);
        },
        error: function() {
            alert('Download failed. Please try again.');
        },
        complete: function() {
            downloadBtn.innerHTML = originalHtml;
            downloadBtn.disabled = false;
        }
    });
}

// Escape HTML to prevent XSS
function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// Infinite scroll
let scrollTimeout;
$(window).on('scroll', function() {
    clearTimeout(scrollTimeout);
    scrollTimeout = setTimeout(function() {
        if ($(window).scrollTop() + $(window).height() > $(document).height() - 500) {
            if (!isLoading && hasMore && currentQuery) {
                currentPage++;
                searchBooks();
            }
        }
    }, 100);
});
</script>
{% endblock %}
