<!-- templates/library/detail.html -->
{% extends "base.html" %}

{% block title %}Book Details - Digital Library{% endblock %}

{% block content %}
<div class="max-w-6xl mx-auto" id="bookDetail">
    <div class="text-center py-12">
        <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
        <p class="mt-4 text-gray-600">Loading book details...</p>
    </div>
</div>

<script>
const bookId = '{{ book_id }}';

$(document).ready(function() {
    loadBookDetails();
});

function loadBookDetails() {
    $.ajax({
        url: `/library/api/books/${bookId}`,
        method: 'GET',
        success: function(book) {
            renderBookDetail(book);
        },
        error: function() {
            $('#bookDetail').html(`
                <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded">
                    <p>Book not found or an error occurred.</p>
                    <a href="/library" class="text-blue-600 hover:underline mt-2 inline-block">← Back to Library</a>
                </div>
            `);
        }
    });
}

function renderBookDetail(book) {
    const html = `
        <div class="bg-white rounded-lg shadow-lg overflow-hidden">
            <div class="md:flex">
                <!-- Cover Image -->
                <div class="md:w-1/3 bg-gray-100 p-6 flex items-center justify-center">
                    <img src="${book.cover || 'https://via.placeholder.com/300x400?text=No+Cover'}" 
                         alt="${book.title}"
                         class="max-w-full h-auto rounded-lg shadow"
                         onerror="this.src='https://via.placeholder.com/300x400?text=No+Cover'">
                </div>
                
                <!-- Book Info -->
                <div class="md:w-2/3 p-6">
                    <h1 class="text-3xl font-bold mb-2">${escapeHtml(book.title)}</h1>
                    <p class="text-xl text-gray-700 mb-4">by ${escapeHtml(book.author || 'Unknown Author')}</p>
                    
                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <div>
                            <span class="text-sm text-gray-500">Year</span>
                            <p class="font-semibold">${book.year || 'N/A'}</p>
                        </div>
                        <div>
                            <span class="text-sm text-gray-500">Publisher</span>
                            <p class="font-semibold">${escapeHtml(book.publisher || 'Unknown')}</p>
                        </div>
                        <div>
                            <span class="text-sm text-gray-500">Language</span>
                            <p class="font-semibold">${book.language || 'English'}</p>
                        </div>
                        <div>
                            <span class="text-sm text-gray-500">Pages</span>
                            <p class="font-semibold">${book.pages || 'N/A'}</p>
                        </div>
                        <div>
                            <span class="text-sm text-gray-500">Format</span>
                            <p class="font-semibold">${book.format || 'PDF'}</p>
                        </div>
                        <div>
                            <span class="text-sm text-gray-500">File Size</span>
                            <p class="font-semibold">${book.size || 'Unknown'}</p>
                        </div>
                    </div>
                    
                    <div class="mb-6">
                        <h3 class="font-semibold text-lg mb-2">Description</h3>
                        <p class="text-gray-700">${escapeHtml(book.description) || 'No description available.'}</p>
                    </div>
                    
                    <div class="flex gap-3">
                        <button onclick="downloadBook('${book.id}', '${escapeHtml(book.title)}')" 
                                class="flex-1 bg-green-600 text-white px-6 py-3 rounded-lg hover:bg-green-700 transition text-lg font-semibold">
                            <i class="fas fa-download mr-2"></i>Download Book
                        </button>
                        <a href="/library" 
                           class="flex-1 bg-gray-600 text-white text-center px-6 py-3 rounded-lg hover:bg-gray-700 transition text-lg font-semibold">
                            <i class="fas fa-search mr-2"></i>Search More
                        </a>
                    </div>
                </div>
            </div>
        </div>
    `;
    
    $('#bookDetail').html(html);
}

function downloadBook(bookId, title) {
    if (!confirm(`Download "${title}"?`)) return;
    
    const downloadBtn = event.target.closest('button');
    const originalHtml = downloadBtn.innerHTML;
    downloadBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Downloading...';
    downloadBtn.disabled = true;
    
    $.ajax({
        url: `/library/api/books/${bookId}/download`,
        method: 'POST',
        xhrFields: {
            responseType: 'blob'
        },
        success: function(blob) {
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${title}.pdf`;
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
            a.remove();
            
            showToast('Download started successfully!', 'success');
        },
        error: function() {
            showToast('Download failed. Please try again.', 'error');
        },
        complete: function() {
            downloadBtn.innerHTML = originalHtml;
            downloadBtn.disabled = false;
        }
    });
}

function showToast(message, type) {
    const bgColor = type === 'success' ? 'bg-green-600' : 'bg-red-600';
    const toast = $(`<div class="fixed bottom-4 right-4 ${bgColor} text-white px-6 py-3 rounded-lg shadow-lg z-50">${message}</div>`);
    $('body').append(toast);
    setTimeout(() => toast.fadeOut(300, function() { $(this).remove(); }), 3000);
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}
</script>
{% endblock %}
